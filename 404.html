<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Click Tourist Mode</title>
    <link rel="stylesheet" href="./styles.css?v=roadshow-7" />
  </head>
  <body>
    <main class="app-shell">
      <section class="phone" aria-label="Click Tourist Mode mobile flow">
        <div class="status-bar" aria-hidden="true">
          <span>14:32</span>
          <div class="status-icons">
            <span class="signal"></span>
            <span class="wifi"></span>
            <span class="battery"></span>
          </div>
        </div>

        <header class="topbar">
          <button class="avatar-btn" type="button" aria-label="Profile"></button>
          <label class="search-box">
            <span></span>
            <input value="" placeholder="Search" readonly />
          </label>
          <button class="round-btn gift-btn" type="button" aria-label="Offers"></button>
        </header>

        <section id="screen" class="screen" aria-live="polite"></section>
      </section>
    </main>

    <script src="./script.js?v=roadshow-7"></script>
  </body>
</html>
